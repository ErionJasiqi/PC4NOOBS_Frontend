name: Build and Deploy Yusuf

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./httpdocs

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: none

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./node-app

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PLESK_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PLESK_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to Plesk
        run: |
          scp -r -P 22 ./node-app/* ${{ secrets.PLESK_USERNAME }}@${{ secrets.PLESK_IP }}:/var/www/vhosts/pc4noobs.ch/httpdocs/
